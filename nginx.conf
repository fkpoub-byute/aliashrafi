# ══════════ Security Headers ══════════
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.simpleicons.org data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# ══════════ Hide Server Version ══════════
server_tokens off;

# ══════════ Force HTTPS ══════════
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# ══════════ Block Sensitive Files ══════════
location ~* \.(env|git|htaccess|htpasswd|log|sql|bak|sh|ini)$ {
    deny all;
    return 404;
}

# ══════════ Gzip Compression ══════════
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
gzip_min_length 256;

# ══════════ Cache ══════════
location ~* \.(css|js|jpg|jpeg|png|webp|avif|gif|svg|woff2|woff)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
