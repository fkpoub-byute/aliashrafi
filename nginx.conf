# ══════════ Hide Server Version ══════════
server_tokens off;

# ══════════ Force HTTPS ══════════
server {
    listen 80;
    server_name mrashrafi.ir www.mrashrafi.ir;
    return 301 https://mrashrafi.ir$request_uri;
}

server {

    listen 443 ssl http2;
    server_name mrashrafi.ir www.mrashrafi.ir;

    root /var/www/mrashrafi;
    index index.html;

# ══════════ Security Headers ══════════

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

add_header Content-Security-Policy "
default-src 'self';
script-src 'self';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
img-src 'self' https://cdn.simpleicons.org data:;
connect-src 'self';
frame-ancestors 'none';
base-uri 'self';
form-action 'self';
upgrade-insecure-requests;
" always;

# ══════════ Block Sensitive Files ══════════

location ~ /\.(env|git) {
    deny all;
}

location ~* \.(log|sql|bak|ini|sh)$ {
    deny all;
}

# ══════════ Gzip Compression ══════════

gzip on;
gzip_comp_level 6;
gzip_min_length 256;

gzip_types
text/plain
text/css
application/javascript
application/json
text/xml
application/xml
image/svg+xml;

# ══════════ Cache Static Files ══════════

location ~* \.(css|js|jpg|jpeg|png|webp|avif|gif|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

}
